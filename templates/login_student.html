<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BunkMaster — Student Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:#080b18;--surface:#0f1428;--card:#131929;
      --border:rgba(255,255,255,.07);--green:#3dffa0;--blue:#4d9eff;--red:#ff4d6d;
      --text:#e2e8f0;--subtext:#94a3b8;--muted:#4a5568;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;}
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 0% 0%,rgba(61,255,160,.08) 0%,transparent 60%),
        radial-gradient(ellipse 50% 50% at 100% 100%,rgba(77,158,255,.06) 0%,transparent 60%),
        var(--bg);
    }
    .login-box{
      width:100%;max-width:400px;
      background:var(--card);
      border:1px solid rgba(61,255,160,.18);
      border-radius:24px;padding:36px 32px;
    }
    .back-link{
      display:flex;align-items:center;gap:6px;
      font-size:12px;color:var(--muted);text-decoration:none;
      margin-bottom:28px;transition:color .2s;
    }
    .back-link:hover{color:var(--subtext);}
    
    .field{
      width:100%;background:rgba(255,255,255,.04) !important;
      border:1px solid var(--border);border-radius:12px;
      color:var(--text) !important;padding:12px 14px;
      font-family:'DM Sans',sans-serif;font-size:14px;
      outline:none;transition:border-color .2s;
    }
    
    /* ── FIX: Prevent white background on auto-fill ── */
    input:-webkit-autofill { 
      -webkit-text-fill-color: white !important; 
      -webkit-box-shadow: 0 0 0px 1000px #131929 inset !important; 
    }

    .field:focus{border-color:rgba(61,255,160,.45);}
    .field-label{font-size:11px;font-weight:600;color:var(--subtext);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px;}
    
    .btn{
      width:100%;background:linear-gradient(135deg,#1fcc77,#3dffa0);
      color:#060910;font-weight:700;font-size:14px;
      border:none;border-radius:12px;padding:13px;
      cursor:pointer;transition:transform .15s,box-shadow .2s;
      box-shadow:0 6px 24px rgba(61,255,160,.28);
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(61,255,160,.45);}
    
    .flash-error{
      background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);
      color:#ff4d6d;border-radius:10px;padding:10px 14px;
      font-size:13px;margin-bottom:16px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <a href="/" class="back-link">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to role selection
    </a>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <span style="font-size:28px;">🎓</span>
      <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:#3dffa0;">Student Login</h1>
    </div>
    <p style="font-size:13px;color:var(--subtext);margin-bottom:28px;">Sign in to view your attendance &amp; bunk status</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
      <div class="flash-error">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST" action="/login/student" style="display:flex;flex-direction:column;gap:18px;">
      <div>
        <label class="field-label" for="rollno">Roll Number</label>
        <input id="rollno" name="rollno" type="text" class="field" placeholder="e.g. 2021CS001" required>
      </div>
      <div>
        <label class="field-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="field" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In as Student</button>
    </form>

    <p style="text-align:center; font-size:12px; color:var(--subtext); margin-top:24px;">
      New here? <a href="/signup/student" style="color:var(--green); text-decoration:none; font-weight:700;">Create an account</a>
    </p>
  </div>
</body>
</html>
